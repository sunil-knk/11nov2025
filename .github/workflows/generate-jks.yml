name: Generate JKS - MDM06-3745

run-name: >
  Generate JKS for ${{ inputs.environment }}
  with file ${{ inputs.jks_file_name }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment
        required: true
        default: dev01
        type: choice
        options:
          - dev01
          - dev02
          - test
          - sit
          - nft
          - prod

      password_secret_id:
        description: AWS Secrets Manager Secret ID (JKS password)
        required: true

      jks_file_name:
        description: Name of JKS file
        required: true

      s3_bucket:
        description: S3 bucket where JKS is stored
        required: true

      s3_path:
        description: S3 path (folder)
        required: true

      secret_name:
        description: AWS Secret name to upload JKS (optional)
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  generate-jks:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java (required for keytool)
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      - name: Set environment variables
        run: |
          echo "AWS_REGION=ap-southeast-2" >> $GITHUB_ENV
          echo "AWS_ACCOUNT_ID=${{ vars.AWS_ACCOUNT_ID }}" >> $GITHUB_ENV
          echo "CERTIFICATE_BUCKET=cu-cmdm-${{ inputs.environment }}-client-certificates" >> $GITHUB_ENV

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/GHA-TrustRole
          aws-region: ${{ env.AWS_REGION }}

      # -------------------------------
      # Fetch JKS password
      # -------------------------------
      - name: Fetch JKS password
        id: get_secret
        run: |
          set -e

          echo "Fetching JKS password from AWS Secrets Manager..."

          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id "${{ inputs.password_secret_id }}" \
            --query SecretString \
            --output text)

          if [ -z "$SECRET" ]; then
            echo "ERROR: Failed to fetch JKS password"
            exit 1
          fi

          echo "JKS_PASSWORD=$SECRET" >> $GITHUB_ENV

      # -------------------------------
      # Download JKS from S3
      # -------------------------------
      - name: Download JKS from S3
        run: |
          set -e

          FILE_PATH="s3://${{ inputs.s3_bucket }}/${{ inputs.s3_path }}/${{ inputs.jks_file_name }}"

          echo "Downloading JKS from $FILE_PATH"

          aws s3 cp "$FILE_PATH" input.jks

          if [ ! -f "input.jks" ]; then
            echo "ERROR: JKS file not found after download"
            exit 1
          fi

      # -------------------------------
      # Extract expiry date
      # -------------------------------
      - name: Extract expiry from JKS
        run: |
          set -e

          echo "Extracting expiry date from JKS..."

          EXPIRY_RAW=$(keytool -list -v \
            -keystore input.jks \
            -storepass "$JKS_PASSWORD" 2>/dev/null \
            | grep "Valid from" | tail -1 | awk -F'until: ' '{print $2}')

          if [ -z "$EXPIRY_RAW" ]; then
            echo "ERROR: Unable to extract expiry date. Possible wrong password or invalid JKS"
            exit 1
          fi

          echo "Raw expiry: $EXPIRY_RAW"

          EXPIRY=$(date -d "$EXPIRY_RAW" "+%Y%m%d" 2>/dev/null || true)

          if [ -z "$EXPIRY" ]; then
            echo "ERROR: Failed to parse expiry date"
            exit 1
          fi

          echo "EXPIRY=$EXPIRY" >> $GITHUB_ENV

      # -------------------------------
      # Rename JKS
      # -------------------------------
      - name: Generate new JKS filename
        run: |
          set -e

          NEW_NAME="${{ inputs.jks_file_name }}.${EXPIRY}.jks"

          cp input.jks "$NEW_NAME"

          echo "JKS_FILENAME_WITH_EXPIRY_DATE=$NEW_NAME" >> $GITHUB_ENV

          echo "Generated file: $NEW_NAME"

      # -------------------------------
      # Import AWS CA cert
      # -------------------------------
      - name: Import AWS CA certificate
        run: |
          set -e

          echo "Importing AWS CA certificate..."

          if [ ! -f "certs/AmazonRootCA1.cer" ]; then
            echo "ERROR: AWS CA cert not found (certs/AmazonRootCA1.cer)"
            exit 1
          fi

          keytool -import \
            -keystore "$JKS_FILENAME_WITH_EXPIRY_DATE" \
            -storepass "$JKS_PASSWORD" \
            -file certs/AmazonRootCA1.cer \
            -alias AmazonRootCA1 \
            -noprompt

      # -------------------------------
      # Validate JKS
      # -------------------------------
      - name: Validate JKS
        run: |
          set -e

          echo "Validating JKS..."

          keytool -list \
            -keystore "$JKS_FILENAME_WITH_EXPIRY_DATE" \
            -storepass "$JKS_PASSWORD" > /dev/null

          echo "JKS validation successful"

      # -------------------------------
      # Upload to S3
      # -------------------------------
      - name: Upload JKS to S3
        run: |
          set -e

          DEST="s3://${CERTIFICATE_BUCKET}/${JKS_FILENAME_WITH_EXPIRY_DATE}"

          echo "Uploading to $DEST"

          aws s3 cp "$JKS_FILENAME_WITH_EXPIRY_DATE" "$DEST"

      # -------------------------------
      # Upload to Secrets Manager (optional)
      # -------------------------------
      - name: Upload JKS to AWS Secrets Manager
        if: ${{ inputs.secret_name != '' }}
        run: |
          set -e

          echo "Uploading JKS to Secrets Manager..."

          if aws secretsmanager describe-secret \
            --secret-id "${{ inputs.secret_name }}" >/dev/null 2>&1; then

            echo "Updating existing secret..."

            aws secretsmanager update-secret \
              --secret-id "${{ inputs.secret_name }}" \
              --secret-binary fileb://$JKS_FILENAME_WITH_EXPIRY_DATE

          else
            echo "Creating new secret..."

            aws secretsmanager create-secret \
              --name "${{ inputs.secret_name }}" \
              --secret-binary fileb://$JKS_FILENAME_WITH_EXPIRY_DATE \
              --description "JKS for ${{ inputs.environment }}"
          fi
